<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Cat face background -->
  <circle cx="16" cy="17" r="13" fill="#FFE4B5"/>

  <!-- Left ear -->
  <path d="M5 14 L3 3 L11 10 Z" fill="#FFE4B5"/>
  <path d="M5.5 12 L4.5 5 L9 9 Z" fill="#FFB6C1"/>

  <!-- Right ear -->
  <path d="M27 14 L29 3 L21 10 Z" fill="#FFE4B5"/>
  <path d="M26.5 12 L27.5 5 L23 9 Z" fill="#FFB6C1"/>

  <!-- Eyes -->
  <ellipse cx="11" cy="16" rx="2.5" ry="3" fill="#333"/>
  <ellipse cx="21" cy="16" rx="2.5" ry="3" fill="#333"/>

  <!-- Eye highlights -->
  <circle cx="10" cy="15" r="1" fill="#fff"/>
  <circle cx="20" cy="15" r="1" fill="#fff"/>

  <!-- Nose -->
  <path d="M16 20 L14 23 L18 23 Z" fill="#FFB6C1"/>

  <!-- Mouth -->
  <path d="M16 23 Q16 25 14 26" stroke="#333" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M16 23 Q16 25 18 26" stroke="#333" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="2" y1="19" x2="8" y2="20" stroke="#333" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="2" y1="22" x2="8" y2="22" stroke="#333" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="24" y1="20" x2="30" y2="19" stroke="#333" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="24" y1="22" x2="30" y2="22" stroke="#333" stroke-width="0.8" stroke-linecap="round"/>
</svg>
